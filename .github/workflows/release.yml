name: Production Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: >
          dotnet build src/TrueWindowsCopilot/TrueWindowsCopilot.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}

      - name: Copy build output
        run: |
          $src = "src/TrueWindowsCopilot/bin/${{ matrix.platform }}/Release/net10.0-windows10.0.22621.0"
          Copy-Item $src publish/${{ matrix.rid }} -Recurse -Force

      - name: Zip artifacts
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath publish/TrueWindowsCopilot-${{ matrix.rid }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueWindowsCopilot-${{ matrix.rid }}
          path: publish/TrueWindowsCopilot-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
